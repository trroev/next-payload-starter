name: 'Setup and install'
description: 'Common setup steps for CI jobs'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      with:
        run_install: false

    # `cache: pnpm` caches the pnpm content-addressable store keyed on the
    # lockfile — that is the install-time speedup. On a warm store,
    # `pnpm install --frozen-lockfile` does no network work and just links
    # packages into node_modules. We deliberately do NOT cache node_modules
    # itself: in a pnpm monorepo it is a large web of symlinks plus the .pnpm
    # virtual store, and its cache-save Post step contends across the parallel
    # jobs (measured: it stalls CI). Store cache + --prefer-offline is the
    # correct, contention-free speedup.
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'
        check-latest: true

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline
