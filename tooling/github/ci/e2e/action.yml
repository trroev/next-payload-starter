name: 'E2E'
description: 'Run Playwright end-to-end suite against a built Next.js server'

inputs:
  backend:
    description: 'Database backend under test (used to label uploaded artifacts)'
    required: false
    default: 'mongodb'

runs:
  using: composite
  steps:
    - name: Setup
      uses: ./tooling/github/setup

    - name: Cache Playwright browsers
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

    - name: Install Playwright browsers
      shell: bash
      run: pnpm --filter @repo/e2e exec playwright install --with-deps chromium

    - name: Generate Payload types
      shell: bash
      env:
        SKIP_ENV_VALIDATION: '1'
      run: pnpm --filter web run generate:types

    - name: E2E
      shell: bash
      env:
        SKIP_ENV_VALIDATION: '1'
      run: pnpm --filter @repo/e2e run e2e

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: playwright-report-${{ inputs.backend }}
        path: |
          apps/e2e/playwright-report
          apps/e2e/test-results
        retention-days: 7
        if-no-files-found: ignore
