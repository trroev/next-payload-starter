name: 'Generate Types'
description: 'Generate Payload types and assert they are not stale'

runs:
  using: composite
  steps:
    - name: Setup
      uses: ./tooling/github/setup

    - name: Generate Payload types
      shell: bash
      # Invoke payload directly (no dotenvx) — CI has no private key.
      # CLOUDINARY_URL="" prevents cloudinary's module-load check from reading
      # the encrypted value that payload CLI loads from .env.development.
      # Remove this once CLOUDINARY_URL is gone from that file.
      run: pnpm --filter web exec payload generate:types
      env:
        SKIP_ENV_VALIDATION: 'true'
        CLOUDINARY_URL: ''

    - name: Check for stale Payload types
      shell: bash
      run: git diff --exit-code packages/payload/src/types/payload-types.ts
