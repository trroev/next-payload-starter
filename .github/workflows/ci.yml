name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

env:
  ACT: "${{ false }}"

permissions:
  contents: read

jobs:
  generate-types:
    runs-on: ubuntu-latest
    name: Generate Types
    steps:
      - uses: actions/checkout@v6
      - name: Generate Types
        if: env.ACT != 'true'
        uses: ./tooling/github/ci/generate-types

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v6
      - name: Lint
        if: env.ACT != 'true'
        uses: ./tooling/github/ci/lint

  typecheck:
    runs-on: ubuntu-latest
    name: Typecheck
    steps:
      - uses: actions/checkout@v6
      - name: Typecheck
        if: env.ACT != 'true'
        uses: ./tooling/github/ci/typecheck

  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v6
      - name: Test
        if: env.ACT != 'true'
        uses: ./tooling/github/ci/test

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    steps:
      - uses: actions/checkout@v6
      - name: Coverage
        if: env.ACT != 'true'
        uses: ./tooling/github/ci/coverage

  e2e:
    runs-on: ubuntu-latest
    name: E2E
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://localhost:27017/e2e
      BETTER_AUTH_SECRET: e2e-better-auth-secret-min-32-chars-long
      BETTER_AUTH_URL: http://localhost:3000
      BASE_URL: http://localhost:3000
      PAYLOAD_SECRET: e2e-payload-secret-min-32-characters-long
      CLOUDINARY_CLOUD_NAME: e2e-cloud
      CLOUDINARY_API_KEY: e2e-key
      CLOUDINARY_API_SECRET: e2e-secret
    steps:
      - uses: actions/checkout@v6
      - name: E2E
        if: env.ACT != 'true'
        uses: ./tooling/github/ci/e2e
